name: Build and push backup-runner image

on:
  push:
    paths:
      - 'infrastructure/docker/backup-runner/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: infrastructure/docker/backup-runner
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/t3ck-backup-runner:latest
