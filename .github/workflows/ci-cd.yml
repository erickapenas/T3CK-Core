name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch: {}
  schedule:
    - cron: '0 2 * * *' # daily at 02:00 UTC

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '20'

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run ESLint
        run: pnpm lint
      
      - name: Check Prettier
        run: pnpm format --check

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Type check
        run: pnpm type-check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run tests
        run: pnpm test --coverage --coverageThreshold='{"global":{"lines":80,"functions":80,"branches":80,"statements":80}}'
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-format, type-check]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build packages
        run: pnpm build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: |
            packages/*/dist
            services/*/dist

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, unit-tests]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build
        run: pnpm build
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build and push Docker images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY_AUTH: t3ck/auth-service
          ECR_REPOSITORY_WEBHOOK: t3ck/webhook-service
          ECR_REPOSITORY_TENANT: t3ck/tenant-service
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_AUTH:staging -f services/auth-service/Dockerfile services/auth-service/
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_AUTH:staging
          
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_WEBHOOK:staging -f services/webhook-service/Dockerfile services/webhook-service/
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_WEBHOOK:staging
          
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_TENANT:staging -f services/tenant-service/Dockerfile services/tenant-service/
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_TENANT:staging
      
      - name: Deploy to ECS
        run: |
          aws ecs update-service --cluster t3ck-cluster --service auth-service --force-new-deployment
          aws ecs update-service --cluster t3ck-cluster --service webhook-service --force-new-deployment
          aws ecs update-service --cluster t3ck-cluster --service tenant-service --force-new-deployment

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run E2E tests
        env:
          ENVIRONMENT: staging
          STAGING_URL: ${{ secrets.STAGING_URL }}
        run: pnpm test:e2e:staging

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, unit-tests, e2e-tests]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build
        run: pnpm build
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build and push Docker images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY_AUTH: t3ck/auth-service
          ECR_REPOSITORY_WEBHOOK: t3ck/webhook-service
          ECR_REPOSITORY_TENANT: t3ck/tenant-service
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_AUTH:latest -f services/auth-service/Dockerfile services/auth-service/
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY_AUTH:latest $ECR_REGISTRY/$ECR_REPOSITORY_AUTH:prod-${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_AUTH:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_AUTH:prod-${{ github.sha }}
          
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_WEBHOOK:latest -f services/webhook-service/Dockerfile services/webhook-service/
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY_WEBHOOK:latest $ECR_REGISTRY/$ECR_REPOSITORY_WEBHOOK:prod-${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_WEBHOOK:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_WEBHOOK:prod-${{ github.sha }}
          
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_TENANT:latest -f services/tenant-service/Dockerfile services/tenant-service/
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY_TENANT:latest $ECR_REGISTRY/$ECR_REPOSITORY_TENANT:prod-${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_TENANT:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_TENANT:prod-${{ github.sha }}
      
      - name: Store current task definitions
        run: |
          aws ecs describe-task-definition --task-definition auth-service:1 --query 'taskDefinition' > /tmp/auth-task-def.json || echo '{}' > /tmp/auth-task-def.json
          aws ecs describe-task-definition --task-definition webhook-service:1 --query 'taskDefinition' > /tmp/webhook-task-def.json || echo '{}' > /tmp/webhook-task-def.json
          aws ecs describe-task-definition --task-definition tenant-service:1 --query 'taskDefinition' > /tmp/tenant-task-def.json || echo '{}' > /tmp/tenant-task-def.json
      
      - name: Upload previous task definitions for rollback
        uses: actions/upload-artifact@v3
        with:
          name: task-definitions-rollback
          path: /tmp/*-task-def.json
          retention-days: 7
      
      - name: Deploy to ECS (Blue-Green)
        run: |
          # Update services with new image and wait for deployment
          aws ecs update-service --cluster t3ck-cluster --service auth-service --force-new-deployment --region ${{ env.AWS_REGION }}
          aws ecs update-service --cluster t3ck-cluster --service webhook-service --force-new-deployment --region ${{ env.AWS_REGION }}
          aws ecs update-service --cluster t3ck-cluster --service tenant-service --force-new-deployment --region ${{ env.AWS_REGION }}
          
          # Wait for services to stabilize (max 10 minutes)
          aws ecs wait services-stable --cluster t3ck-cluster --services auth-service webhook-service tenant-service --region ${{ env.AWS_REGION }} || exit 1
      
      - name: Run smoke tests
        env:
          PROD_URL: ${{ secrets.PROD_URL }}
        run: bash scripts/smoke-tests.sh
      
      - name: Verify service stability
        run: |
          echo "🔍 Verifying service stability..."
          
          for i in {1..3}; do
            echo "Check $i/3..."
            
            # Check service is running
            RUNNING=$(aws ecs describe-services --cluster t3ck-cluster --services auth-service webhook-service tenant-service --region ${{ env.AWS_REGION }} --query 'services[*].runningCount' --output text)
            
            if [[ $RUNNING =~ ^[1-9][\ 1-9]* ]]; then
              echo "✓ All services running"
            else
              echo "✗ Services not stable"
              exit 1
            fi
            
            sleep 10
          done
          
          echo "✅ Services are stable!"
      
      - name: Notify deployment success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: '✅ Production deployment successful'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author
      
      - name: Rollback on failure
        if: failure()
        run: |
          echo "⚠️ Deployment failed, rolling back..."
          
          # Use previous task definitions to rollback
          aws ecs update-service --cluster t3ck-cluster --service auth-service --force-new-deployment --region ${{ env.AWS_REGION }}
          aws ecs update-service --cluster t3ck-cluster --service webhook-service --force-new-deployment --region ${{ env.AWS_REGION }}
          aws ecs update-service --cluster t3ck-cluster --service tenant-service --force-new-deployment --region ${{ env.AWS_REGION }}
          
          exit 1
      
      - name: Notify deployment failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: '❌ Production deployment failed - automatic rollback triggered'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build]
    # Run on main merges, manual dispatch or scheduled runs
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "ENV=production" >> $GITHUB_OUTPUT
          else
            echo "ENV=staging" >> $GITHUB_OUTPUT
          fi

      - name: Run integration/E2E tests
        env:
          ENVIRONMENT: ${{ steps.env.outputs.ENV }}
          STAGING_URL: ${{ secrets.STAGING_URL }}
          PROD_URL: ${{ secrets.PROD_URL }}
        run: |
          if [ "${{ steps.env.outputs.ENV }}" = "production" ]; then
            pnpm test:e2e:production || exit 1
          else
            pnpm test:e2e:staging || exit 1
          fi
