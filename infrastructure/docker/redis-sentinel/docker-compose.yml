version: '3.8'

services:
  # Redis Master
  redis-master:
    image: redis:7-alpine
    container_name: redis-master
    ports:
      - "6379:6379"
    volumes:
      - redis-master-data:/data
    command: redis-server --appendonly yes --requirepass redis123
    networks:
      - redis-sentinel-net
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Replica 1
  redis-replica-1:
    image: redis:7-alpine
    container_name: redis-replica-1
    ports:
      - "6380:6379"
    volumes:
      - redis-replica-1-data:/data
    command: redis-server --appendonly yes --replicaof redis-master 6379 --requirepass redis123 --masterauth redis123
    networks:
      - redis-sentinel-net
    depends_on:
      - redis-master
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Replica 2
  redis-replica-2:
    image: redis:7-alpine
    container_name: redis-replica-2
    ports:
      - "6381:6379"
    volumes:
      - redis-replica-2-data:/data
    command: redis-server --appendonly yes --replicaof redis-master 6379 --requirepass redis123 --masterauth redis123
    networks:
      - redis-sentinel-net
    depends_on:
      - redis-master
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Sentinel 1
  redis-sentinel-1:
    image: redis:7-alpine
    container_name: redis-sentinel-1
    ports:
      - "26379:26379"
    volumes:
      - ./sentinel-1.conf:/etc/redis/sentinel.conf
      - sentinel-1-data:/data
    command: redis-sentinel /etc/redis/sentinel.conf --port 26379
    networks:
      - redis-sentinel-net
    depends_on:
      - redis-master
      - redis-replica-1
      - redis-replica-2
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Sentinel 2
  redis-sentinel-2:
    image: redis:7-alpine
    container_name: redis-sentinel-2
    ports:
      - "26380:26379"
    volumes:
      - ./sentinel-2.conf:/etc/redis/sentinel.conf
      - sentinel-2-data:/data
    command: redis-sentinel /etc/redis/sentinel.conf --port 26379
    networks:
      - redis-sentinel-net
    depends_on:
      - redis-master
      - redis-replica-1
      - redis-replica-2
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Sentinel 3
  redis-sentinel-3:
    image: redis:7-alpine
    container_name: redis-sentinel-3
    ports:
      - "26381:26379"
    volumes:
      - ./sentinel-3.conf:/etc/redis/sentinel.conf
      - sentinel-3-data:/data
    command: redis-sentinel /etc/redis/sentinel.conf --port 26379
    networks:
      - redis-sentinel-net
    depends_on:
      - redis-master
      - redis-replica-1
      - redis-replica-2
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  redis-sentinel-net:
    driver: bridge

volumes:
  redis-master-data:
  redis-replica-1-data:
  redis-replica-2-data:
  sentinel-1-data:
  sentinel-2-data:
  sentinel-3-data:
