# Redis Sentinel 3 Configuration
# For local testing with docker-compose

port 26379
bind 0.0.0.0

daemonize no
logfile ""

# Monitor t3ck Redis master
sentinel monitor t3ck-redis-master redis-master 6379 2

# Down after X milliseconds (30 seconds)
sentinel down-after-milliseconds t3ck-redis-master 30000

# Timeout for failover (180 seconds = 3 minutes)
sentinel failover-timeout t3ck-redis-master 180000

# Number of replicas to reconfigure in parallel
sentinel parallel-syncs t3ck-redis-master 1

# Master password (matches redis master password)
sentinel auth-pass t3ck-redis-master redis123
sentinel auth-user t3ck-redis-master default

# Disable dangerous commands
sentinel deny-scripts-reconfig yes

# Database
databases 16

# Persistence
save 900 1
save 300 10
save 60 10000

# RDB
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb

# AOF
appendonly no

# Memory
maxclients 10000

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Timeout
timeout 0
