# Redis Sentinel Configuration
# High Availability setup for T3CK Core Redis

# Sentinel monitoring configuration for T3CK Redis master
# Replace placeholder IPs with actual Redis master IP
sentinel monitor t3ck-redis-master REDIS_MASTER_IP 6379 2

# Required quorum to declare master down
# 2 out of 3 Sentinels must agree master is down
sentinel quorum 2

# Timeout to wait master to connect before considering it down
sentinel down-after-milliseconds t3ck-redis-master 30000

# How long to wait to failover when master is down
sentinel failover-timeout t3ck-redis-master 180000

# Number of parallel reconfigurations during failover
sentinel parallel-syncs t3ck-redis-master 1

# Authentication (if Redis master has password)
# Uncomment these if using Redis authentication
# sentinel auth-user t3ck-redis-master default
# sentinel auth-pass t3ck-redis-master YOUR_REDIS_PASSWORD

# Sentinel port (default 26379)
port 26379

# Sentinel bind address (change to 0.0.0.0 for production)
bind 0.0.0.0

# Daemonize mode (set to yes in production)
daemonize no

# Log file
logfile ""

# Database directory
dir "./data"

# Sentinel notification scripts (optional)
# Called on events like master-reconfig-script, notification-script
# sentinel notification-script t3ck-redis-master /path/to/notification.sh
# sentinel client-reconfig-script t3ck-redis-master /path/to/reconfig.sh

# Failover notification - this script is called after failover completes
# The script receives the following arguments:
# master-name, role (master|replica), state (start|end), from-ip, from-port, to-ip, to-port
# Example:
# sentinel client-reconfig-script t3ck-redis-master /app/scripts/notify-failover.sh

# Advanced Sentinel settings

# Deny CONFIG set/get commands from clients
sentinel deny-scripts-reconfig yes

# TCP backlog for Sentinel connections
tcp-backlog 511

# TCP keepalive (sends keep-alive probes)
tcp-keepalive 300

# Sentinel loglevel (debug, verbose, notice, warning)
loglevel notice

# Number of databases (typically 16)
databases 16

# Save configuration on disk periodically
save 900 1
save 300 10
save 60 10000

# Stop accepting writes if unable to write RDB
stop-writes-on-bgsave-error yes

# Compress RDB file
rdbcompression yes

# Checksums in RDB
rdbchecksum yes

# RDB filename
dbfilename dump.rdb

# AOF - Append Only File (optional, for higher durability)
appendonly no
appendfilename "appendonly.aof"
appendfsync everysec

# Slowlog configuration (log queries slower than threshold)
slowlog-log-slower-than 10000
slowlog-max-len 128

# Client timeout (close idle connections after N seconds)
timeout 0

# Maximum number of connected clients
maxclients 10000

# Memory management
# maxmemory 4gb
# maxmemory-policy allkeys-lru

# Disable dangerous commands in production
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG "CONFIG_secret_token_12345"

# Require authentication to connect to Sentinel
# requirepass sentinel_password

# Sentinel down-after settings for replica servers
# Sets the slave-priority when slave is marked as disconnected
sentinel min-slave-to-write 1
sentinel min-slave-max-lag 10
